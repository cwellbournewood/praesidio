# Suppress secret-scanning alerts on paths that intentionally contain
# pattern-matching fake credentials. These are detector test fixtures —
# Praesidio's whole job is recognising these shapes, so the test corpus
# necessarily ships realistic-looking ones.
#
# Real-secret protection on the rest of the repo stays ON.
paths-ignore:
  - "bench/eval/corpora/**"
  - "services/gateway/tests/**"
  - "services/gateway/tests/cassettes/**"
  - "services/edge-proxy/tests/**"
  - "services/ui/lib/mock.ts"
  - "services/ui/lib/labels.ts"
  - "services/ui/app/onboarding/page.tsx"
  - "services/ui/app/simulator/page.tsx"
  - "clients/**/tests/**"
  - "docs/redteam/**"
  - "examples/policies/modes/**/eval.suite/**"
