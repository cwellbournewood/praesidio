name: admission

# Smoke-tests the Section admission policy on a kind cluster:
#   1. install ValidatingAdmissionPolicy
#   2. apply test/test-pod-allowed.yaml — expect SUCCESS
#   3. apply test/test-pod-blocked.yaml — expect FAILURE
# Re-runs the same fixtures against Gatekeeper to keep the alternate path
# from rotting.

on:
  pull_request:
    paths:
      - "deploy/k8s/admission/**"
      - ".github/workflows/admission.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: admission-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vap:
    name: ValidatingAdmissionPolicy (k8s 1.30)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          node_image: kindest/node:v1.30.0
          cluster_name: section-admission

      - name: Apply ValidatingAdmissionPolicy
        run: |
          kubectl apply -f deploy/k8s/admission/validating-admission-policy.yaml
          kubectl wait --for=jsonpath='{.status.observedGeneration}'=1 \
              validatingadmissionpolicy/section-llm-egress-guard --timeout=60s || true

      - name: Allowed pod must be admitted
        run: |
          set -euo pipefail
          kubectl create namespace test-vap
          if ! kubectl -n test-vap apply -f deploy/k8s/admission/test/test-pod-allowed.yaml; then
            echo "::error::test-pod-allowed.yaml was rejected but should be admitted"
            exit 1
          fi
          kubectl -n test-vap delete pod section-admission-allowed --ignore-not-found

      - name: Blocked pod must be rejected
        run: |
          set +e
          out=$(kubectl -n test-vap apply -f deploy/k8s/admission/test/test-pod-blocked.yaml 2>&1)
          rc=$?
          echo "$out"
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::test-pod-blocked.yaml was admitted but must be rejected"
            kubectl -n test-vap delete pod section-admission-blocked --ignore-not-found
            exit 1
          fi
          echo "$out" | grep -qiE "section|gateway|forbidden" || {
            echo "::error::Rejection message did not mention Section guard"
            exit 1
          }

  gatekeeper:
    name: OPA Gatekeeper
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          version: v0.23.0
          node_image: kindest/node:v1.30.0
          cluster_name: section-gk

      - name: Install Gatekeeper
        run: |
          helm repo add gatekeeper https://open-policy-agent.github.io/gatekeeper/charts
          helm upgrade --install gatekeeper gatekeeper/gatekeeper \
              -n gatekeeper-system --create-namespace \
              --set replicas=1 --set auditInterval=5
          kubectl -n gatekeeper-system rollout status deploy/gatekeeper-controller-manager --timeout=180s

      - name: Apply ConstraintTemplate + Constraint
        run: |
          kubectl apply -f deploy/k8s/admission/gatekeeper-constraint-template.yaml
          # Gatekeeper needs a few seconds to compile and register the CRD.
          for i in $(seq 1 30); do
            if kubectl get crd sectionllmegressguard.constraints.gatekeeper.sh >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          kubectl apply -f deploy/k8s/admission/gatekeeper-constraint.yaml
          sleep 5  # let the constraint take effect

      - name: Allowed pod must be admitted
        run: |
          kubectl create namespace test-gk
          kubectl -n test-gk apply -f deploy/k8s/admission/test/test-pod-allowed.yaml
          kubectl -n test-gk delete pod section-admission-allowed --ignore-not-found

      - name: Blocked pod must be rejected
        run: |
          set +e
          out=$(kubectl -n test-gk apply -f deploy/k8s/admission/test/test-pod-blocked.yaml 2>&1)
          rc=$?
          echo "$out"
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "::error::Gatekeeper admitted the blocked pod"
            kubectl -n test-gk delete pod section-admission-blocked --ignore-not-found
            exit 1
          fi
