name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gateway:
    name: gateway (python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/gateway
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/gateway/uv.lock

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        # --extra dev pulls in ruff + pytest + asyncio plugin needed by the
        # next two steps.
        run: uv sync --frozen --extra dev

      - name: Ruff
        run: uv run ruff check .

      - name: Pytest
        run: uv run pytest -q --maxfail=1 --ignore=tests/test_e2e_real_llm.py --ignore=tests/test_alembic.py --ignore=tests/test_rls_postgres.py

      # Verify the Python label-display map and the TS twin in
      # services/ui/lib/labels.ts have not drifted. Source of truth is
      # the Python file — edit it first, then sync TS.
      - name: Label display sync (Python ↔ TS)
        working-directory: ${{ github.workspace }}
        run: uv run --project services/gateway python scripts/check_label_display_sync.py

  ui:
    name: ui (next.js)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: services/ui/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
