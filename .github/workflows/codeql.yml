name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 07:00 UTC — catches new analyser rules even without commits.
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: python
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialise CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-extended,security-and-quality
          config: |
            paths:
              - services/gateway/section_gateway
              - services/ui/app
              - services/ui/components
              - services/ui/lib
              - scripts
              - .github/workflows
            paths-ignore:
              - "**/__pycache__/**"
              - "**/.next/**"
              - "**/node_modules/**"
              - "**/tests/**"
              - "**/test_*.py"

      - name: Analyse
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
