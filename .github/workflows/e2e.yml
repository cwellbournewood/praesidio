name: e2e

# End-to-end check: builds the gateway + UI images locally, brings up
# the full docker-compose stack, runs the demo, then runs the
# `praesidio-audit verify` CLI from lane A against the resulting
# audit chain. Artefacts capture /admin/events and /metrics for
# post-mortem.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compose-e2e:
    name: docker compose + demo + audit verify
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      COMPOSE_DOCKER_CLI_BUILD: "1"
      DOCKER_BUILDKIT: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-${{ runner.os }}-${{ hashFiles('services/gateway/Dockerfile','services/ui/Dockerfile','services/gateway/pyproject.toml','services/ui/pnpm-lock.yaml') }}
          restore-keys: |
            buildx-${{ runner.os }}-

      - name: Set up Python (for praesidio-audit CLI)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/gateway/uv.lock

      - name: Prepare env
        run: |
          cp .env.example .env
          sed -i 's|REPLACE_WITH_BASE64_32_BYTES|'"$(openssl rand -base64 32)"'|' .env
          sed -i 's|REPLACE_WITH_HEX_KEY|'"$(openssl rand -hex 32)"'|' .env
          sed -i 's|REPLACE_WITH_HEX_TWEAK|'"$(openssl rand -hex 7)"'|' .env

      - name: Build images
        run: docker compose build --progress=plain

      - name: Bring up stack
        run: docker compose up -d

      - name: Wait for gateway /healthz
        run: |
          for i in $(seq 1 90); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "gateway healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "gateway never became healthy" >&2
          docker compose logs --no-color || true
          exit 1

      - name: Run demo.sh
        env:
          NO_COLOR: "1"
        run: bash scripts/demo.sh http://localhost:8080

      - name: Capture /admin/events
        run: |
          mkdir -p artifacts
          curl -fsS 'http://localhost:8080/admin/events?limit=200' \
            -H 'Authorization: Bearer praesidio-demo-key' \
            -o artifacts/events.json

      - name: Capture /metrics
        run: curl -fsS http://localhost:8080/metrics -o artifacts/metrics.prom

      - name: Install gateway (for praesidio-audit CLI)
        working-directory: services/gateway
        run: uv sync --frozen

      - name: Run praesidio-audit verify
        working-directory: services/gateway
        env:
          PRAESIDIO_GATEWAY: http://localhost:8080
          PRAESIDIO_API_KEY: praesidio-demo-key
          # praesidio-audit CLI talks to Postgres directly (not the gateway)
          # to read + verify the hash chain. The dev compose stack maps
          # postgres to localhost:5432 with the default praesidio creds.
          DATABASE_URL: postgresql+psycopg://praesidio:praesidio@localhost:5432/praesidio
        run: uv run praesidio-audit verify --tenant default --since 1h

      - name: Upload artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-artefacts
          path: artifacts/

      - name: Collect compose logs on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/compose.log || true

      - name: Tear down
        if: always()
        run: docker compose down -v --remove-orphans || true

  cassettes:
    name: real-LLM cassette E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: services/gateway/uv.lock

      - name: Install gateway with dev deps
        working-directory: services/gateway
        run: uv sync --extra dev

      - name: Download spaCy model
        working-directory: services/gateway
        run: uv run python -m spacy download en_core_web_sm

      - name: Run cassette E2E (real-LLM shapes, respx-mocked upstream)
        working-directory: services/gateway
        env:
          PRAESIDIO_ENV: development
          DATABASE_URL: "sqlite+aiosqlite:///:memory:"
          REDIS_URL: ""
          PRAESIDIO_API_KEYS: test-key
        run: uv run pytest tests/test_e2e_real_llm.py -v

      - name: Run Alembic regression suite
        working-directory: services/gateway
        run: uv run pytest tests/test_alembic.py -v
