name: helm

on:
  pull_request:
    paths:
      - "deploy/helm/**"
      - "services/gateway/**"
      - "services/ui/**"
      - "scripts/demo.sh"
      - ".github/workflows/helm.yml"
  push:
    branches: [main]
    paths:
      - "deploy/helm/**"
      - "services/gateway/**"
      - "services/ui/**"
      - "scripts/demo.sh"
      - ".github/workflows/helm.yml"

concurrency:
  group: helm-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint + template
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: helm lint
        run: helm lint deploy/helm/section

      - name: helm template (defaults)
        run: helm template section deploy/helm/section > render-default.yaml

      - name: helm template (embedded + plain secrets, dev profile)
        run: |
          helm template section deploy/helm/section \
            --set postgres.embedded=true \
            --set redis.embedded=true \
            --set secrets.externalSecrets=false \
            --set ingress.enabled=true \
            > render-dev.yaml

      - name: kubeconform
        uses: docker://ghcr.io/yannh/kubeconform:v0.6.7-alpine
        with:
          entrypoint: /kubeconform
          args: >-
            -strict
            -schema-location default
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json'
            -skip CustomResourceDefinition,ExternalSecret,ServiceMonitor
            render-default.yaml render-dev.yaml

  kind-smoke:
    name: kind install + demo
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-helm-${{ runner.os }}-${{ hashFiles('services/gateway/Dockerfile','services/ui/Dockerfile','services/gateway/pyproject.toml','services/ui/pnpm-lock.yaml') }}
          restore-keys: |
            buildx-helm-${{ runner.os }}-

      - name: Build gateway image (tag local)
        uses: docker/build-push-action@v6
        with:
          context: services/gateway
          tags: ghcr.io/section/gateway:local
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Build UI image (tag local)
        uses: docker/build-push-action@v6
        with:
          context: services/ui
          tags: ghcr.io/section/ui:local
          load: true
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Create kind cluster
        uses: helm/kind-action@v1.10.0
        with:
          cluster_name: section-smoke
          version: v0.23.0

      - name: Load images into kind
        run: |
          kind load docker-image ghcr.io/section/gateway:local --name section-smoke
          kind load docker-image ghcr.io/section/ui:local --name section-smoke

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: helm install (embedded pg/redis, no external secrets, mock keys)
        run: |
          helm install section deploy/helm/section \
            --namespace section --create-namespace \
            --set image.gateway.tag=local \
            --set image.ui.tag=local \
            --set image.gateway.pullPolicy=IfNotPresent \
            --set image.ui.pullPolicy=IfNotPresent \
            --set postgres.embedded=true \
            --set redis.embedded=true \
            --set secrets.externalSecrets=false \
            --set secrets.values.vaultKey="$(openssl rand -base64 32)" \
            --set secrets.values.fpeKey="$(openssl rand -hex 32)" \
            --set secrets.values.fpeTweak="$(openssl rand -hex 7)" \
            --set autoscaling.gateway.enabled=false \
            --set replicas.gateway=1 \
            --set replicas.ui=1 \
            --wait --timeout 8m

      - name: helm get manifest
        run: |
          mkdir -p artifacts
          helm get manifest section -n section > artifacts/manifest.yaml

      - name: Wait for pods Ready
        run: |
          kubectl -n section rollout status deploy -l app.kubernetes.io/component=gateway --timeout=5m || true
          kubectl -n section get pods -o wide

      - name: Port-forward gateway
        run: |
          kubectl -n section port-forward svc/section-gateway 8080:8080 >/tmp/pf.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "gateway healthy via port-forward after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "gateway not healthy via port-forward" >&2
          cat /tmp/pf.log || true
          kubectl -n section describe pods || true
          exit 1

      - name: Run demo.sh against kind
        env:
          NO_COLOR: "1"
        run: bash scripts/demo.sh http://localhost:8080

      - name: Collect cluster state on failure
        if: failure()
        run: |
          mkdir -p artifacts
          kubectl -n section get all -o wide > artifacts/all.txt || true
          kubectl -n section describe pods > artifacts/describe.txt || true
          kubectl -n section logs --tail=500 -l app.kubernetes.io/component=gateway > artifacts/gateway.log || true
          kubectl -n section logs --tail=500 -l app.kubernetes.io/component=ui > artifacts/ui.log || true

      - name: Upload helm artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-kind-smoke
          path: artifacts/
