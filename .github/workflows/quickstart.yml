name: quickstart

# Verifies docs/getting-started.md continues to work end-to-end:
#   clone -> docker compose up -> bash scripts/demo.sh -> exit 0.

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quickstart-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quickstart:
    name: docker compose + demo.sh
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare env
        run: |
          cp .env.example .env
          # Demo-grade key material — sufficient for shape validation only.
          sed -i 's|REPLACE_WITH_BASE64_32_BYTES|'"$(openssl rand -base64 32)"'|' .env
          sed -i 's|REPLACE_WITH_HEX_KEY|'"$(openssl rand -hex 32)"'|' .env
          sed -i 's|REPLACE_WITH_HEX_TWEAK|'"$(openssl rand -hex 7)"'|' .env

      - name: docker compose up (build)
        run: docker compose up --build -d

      - name: Wait for gateway /healthz
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8080/healthz >/dev/null 2>&1; then
              echo "gateway healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "gateway never became healthy" >&2
          docker compose logs --no-color || true
          exit 1

      - name: Run scripts/demo.sh
        env:
          NO_COLOR: "1"
        run: bash scripts/demo.sh http://localhost:8080

      - name: Dump UI smoke
        run: |
          curl -fsS -o /dev/null -w 'ui status: %{http_code}\n' http://localhost:3000 || true

      - name: Collect logs on failure
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose logs --no-color > artifacts/compose.log || true
          curl -fsS http://localhost:8080/admin/events?limit=50 \
            -H 'Authorization: Bearer section-demo-key' \
            > artifacts/events.json || true

      - name: Upload failure artefacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-failure-logs
          path: artifacts/

      - name: docker compose down
        if: always()
        run: docker compose down -v --remove-orphans || true
