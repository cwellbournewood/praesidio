<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Claude (fixture)</title>
    <style>
      body { font-family: system-ui, sans-serif; margin: 24px; max-width: 720px; }
      .ProseMirror {
        width: 100%; min-height: 80px; padding: 8px;
        border: 1px solid #aaa; font: 14px ui-sans-serif, sans-serif;
      }
      .ProseMirror p { margin: 0; }
      button { margin-top: 8px; padding: 6px 14px; font: 13px ui-sans-serif, sans-serif; }
      .response { margin-top: 24px; padding: 12px; border: 1px solid #aaa; min-height: 48px; }
    </style>
  </head>
  <body>
    <h1>Claude (offline fixture)</h1>
    <p>A minimal DOM that mimics the claude.ai composer shape (a
       ProseMirror contenteditable, not a textarea) so the extension's
       content script can be exercised.</p>
    <div class="ProseMirror" contenteditable="true" role="textbox"
         data-placeholder="Message Claude…"><p></p></div>
    <button aria-label="Send Message" type="button">Send</button>
    <div class="response" id="response"
         aria-label="Assistant response"></div>

    <script>
      const editor = document.querySelector('.ProseMirror');
      const btn = document.querySelector('[aria-label="Send Message"]');
      const out = document.getElementById('response');
      function readText() {
        return Array.from(editor.querySelectorAll('p'))
          .map((p) => p.innerText).join('\n');
      }
      btn.addEventListener('click', () => {
        setTimeout(() => {
          out.textContent = `Assistant: I received ${readText()}`;
        }, 200);
      });
    </script>
  </body>
</html>
