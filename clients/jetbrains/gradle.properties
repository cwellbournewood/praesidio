# Praesidio JetBrains plugin — Gradle properties.

# Plugin identity (mirrored into plugin.xml at build time).
pluginGroup = io.praesidio.edge
pluginName = praesidio-jetbrains
pluginVersion = 1.0.0
# IntelliJ Platform build range. 232 = 2023.2, 252 = 2025.2.
pluginSinceBuild = 232
pluginUntilBuild = 252.*

# IntelliJ Platform version used to compile against.
# Operators can override via -PplatformVersion=2024.1.4 on the gradle CLI.
platformType = IC
platformVersion = 2024.1
platformPlugins =
platformBundledPlugins =

# Toolchain.
javaVersion = 17
kotlinVersion = 1.9.24
gradleVersion = 8.5

# Gradle daemon / JVM settings.
org.gradle.jvmargs = -Xmx2g -Dfile.encoding=UTF-8 -XX:+UseG1GC
org.gradle.caching = true
org.gradle.configuration-cache = true
org.gradle.parallel = true

# Kotlin compiler — strict null checks for platform interop.
kotlin.stdlib.default.dependency = true
kotlin.incremental.useClasspathSnapshot = true
