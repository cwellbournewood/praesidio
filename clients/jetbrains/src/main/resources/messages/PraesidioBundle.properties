praesidio.action.scan.block=Praesidio: blocked by policy — {0}
praesidio.action.scan.error=Praesidio scan failed: {0}
praesidio.action.tokenise.replaced=Praesidio: replaced {0} sensitive span(s).
praesidio.action.tokenise.nothing=Praesidio: nothing to tokenise.
