# Praesidio JetBrains plugin — message bundle.
#
# All user-visible strings live here so the plugin can be localised.
# Keys are referenced via PraesidioBundle.message("...") from Kotlin.

# Inspection
praesidio.inspection.group=Praesidio
praesidio.inspection.displayName=Sensitive data detected
praesidio.inspection.problem=Possible {0} ({1}, confidence {2}%)
praesidio.inspection.quickfix.tokenise=Tokenise via Praesidio
