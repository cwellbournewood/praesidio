# Grafana provisioning — dashboards.
# Place this file at /etc/grafana/provisioning/dashboards/dashboards.yaml
# and mount the contents of ../dashboards/ at /var/lib/grafana/dashboards/praesidio/.
apiVersion: 1

providers:
  - name: Praesidio
    orgId: 1
    folder: Praesidio
    folderUid: praesidio
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/praesidio
      foldersFromFilesStructure: false
