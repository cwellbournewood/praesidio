apiVersion: praesidio/v1
kind: Routes
spec:
  - inbound: { path: "/v1/chat/completions", requested_model: "gpt-4o-mini" }
    upstream: openai/gpt-4o-mini

  - inbound: { path: "/v1/chat/completions", requested_model: "gpt-4o" }
    upstream: openai/gpt-4o

  - inbound: { path: "/v1/chat/completions" }
    when: "principal.country in ['DE','FR','IT','ES','NL','PL','SE','FI','BE','AT','DK','IE','PT','GR','CZ','HU','RO']"
    upstream: azure/gpt-4o-eu

  - inbound: { path: "/anthropic/v1/messages" }
    upstream: anthropic/claude-3-5-sonnet
