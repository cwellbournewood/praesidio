{{- if .Values.secrets.externalSecrets }}
# ExternalSecret synced from the operator-managed SecretStore. The resulting
# Secret has the same shape (key names) the gateway Deployment expects.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "praesidio.gatewaySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praesidio.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: {{ .Values.secrets.secretStore.name }}
    kind: {{ .Values.secrets.secretStore.kind }}
  target:
    name: {{ include "praesidio.gatewaySecretName" . }}
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      type: Opaque
      data:
        database-url: {{ `"{{ .databaseUrl }}"` }}
        redis-url: {{ `"{{ .redisUrl }}"` }}
        api-keys: {{ `"{{ .apiKeys }}"` }}
        vault-key: {{ `"{{ .vaultKey }}"` }}
        fpe-key: {{ `"{{ .fpeKey }}"` }}
        fpe-tweak: {{ `"{{ .fpeTweak }}"` }}
        openai-api-key: {{ `"{{ .openaiApiKey }}"` }}
        anthropic-api-key: {{ `"{{ .anthropicApiKey }}"` }}
        azure-openai-api-key: {{ `"{{ .azureOpenaiApiKey }}"` }}
  data:
    - secretKey: vaultKey
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.vaultKey | quote }}
    - secretKey: fpeKey
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.fpeKey | quote }}
    - secretKey: fpeTweak
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.fpeTweak | quote }}
    - secretKey: apiKeys
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.apiKeys | quote }}
    - secretKey: openaiApiKey
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.openaiApiKey | quote }}
    - secretKey: anthropicApiKey
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.anthropicApiKey | quote }}
    - secretKey: azureOpenaiApiKey
      remoteRef:
        key: {{ .Values.secrets.remoteKeys.azureOpenaiApiKey | quote }}
    # databaseUrl / redisUrl are templated from chart values when embedded
    # is true; otherwise sourced from the same SecretStore. Override the
    # remoteKey here if you store them in your KMS too.
    - secretKey: databaseUrl
      remoteRef:
        key: praesidio/gateway/database-url
    - secretKey: redisUrl
      remoteRef:
        key: praesidio/gateway/redis-url
{{- end }}
