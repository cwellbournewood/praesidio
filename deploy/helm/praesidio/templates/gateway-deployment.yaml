apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "praesidio.componentName" (dict "ctx" . "component" "gateway") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praesidio.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if not .Values.autoscaling.gateway.enabled }}
  replicas: {{ .Values.replicas.gateway }}
  {{- end }}
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "praesidio.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "praesidio.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
      annotations:
        # Trigger a rollout whenever the policy bundle or the gateway secret changes.
        checksum/policies: {{ include (print $.Template.BasePath "/configmap-policies.yaml") . | sha256sum }}
        {{- if not .Values.secrets.externalSecrets }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret-gateway.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.metrics.port | quote }}
        prometheus.io/path: {{ .Values.metrics.path | quote }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "praesidio.serviceAccountName" . }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: 30
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: {{ include "praesidio.image" (dict "img" .Values.image.gateway "ctx" .) }}
          imagePullPolicy: {{ .Values.image.gateway.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.gateway.port }}
              protocol: TCP
          env:
            - name: PRAESIDIO_ENV
              value: {{ .Values.gateway.env | quote }}
            - name: PRAESIDIO_LOG_LEVEL
              value: {{ .Values.gateway.logLevel | quote }}
            - name: PRAESIDIO_HOST
              value: {{ .Values.gateway.host | quote }}
            - name: PRAESIDIO_PORT
              value: {{ .Values.gateway.port | quote }}
            - name: PRAESIDIO_FAIL_MODE
              value: {{ .Values.gateway.failMode | quote }}
            - name: PRAESIDIO_POLICY_BUNDLE
              value: {{ .Values.policyBundle.mountPath | quote }}
            - name: PRAESIDIO_POLICY_BUNDLE_SOURCE
              value: {{ .Values.policyBundle.source | quote }}
            - name: PRAESIDIO_POLICY_SIG_MODE
              value: {{ .Values.policyBundle.signatureVerification | quote }}
            {{- if .Values.policyBundle.publicKeyRef }}
            - name: PRAESIDIO_POLICY_PUBKEY_REF
              value: {{ .Values.policyBundle.publicKeyRef | quote }}
            {{- end }}
            {{- if .Values.secrets.kmsRef }}
            - name: PRAESIDIO_KMS_REF
              value: {{ .Values.secrets.kmsRef | quote }}
            {{- end }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: redis-url
            - name: PRAESIDIO_VAULT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: vault-key
            - name: PRAESIDIO_FPE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: fpe-key
            - name: PRAESIDIO_FPE_TWEAK
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: fpe-tweak
            - name: PRAESIDIO_API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: api-keys
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: openai-api-key
                  optional: true
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: anthropic-api-key
                  optional: true
            - name: AZURE_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: azure-openai-api-key
                  optional: true
            {{- with .Values.gateway.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.gateway.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.gateway.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gateway.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.gateway.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.gateway.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.gateway.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.gateway.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.gateway.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.gateway.probes.readiness.failureThreshold }}
          resources:
            {{- toYaml .Values.resources.gateway | nindent 12 }}
          volumeMounts:
            - name: policies
              mountPath: {{ .Values.policyBundle.mountPath }}
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.gateway.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: policies
          {{- if eq .Values.policyBundle.source "configmap" }}
          configMap:
            name: {{ include "praesidio.policyConfigMapName" . }}
            items:
              {{- range $path, $_ := .Files.Glob "files/policies/**.yaml" }}
              {{- $rel := trimPrefix "files/policies/" $path }}
              {{- $key := $rel | replace "/" "__" }}
              - key: {{ $key }}
                path: {{ $rel }}
              {{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir: {}
        {{- with .Values.gateway.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
