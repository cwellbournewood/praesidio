{{- if .Values.migrations.enabled }}
# Pre-upgrade migrations Job. Runs the SQL files mounted from a ConfigMap
# against the configured Postgres database. Hook weight ensures it runs
# before any Deployments/StatefulSets are upgraded.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "praesidio.fullname" . }}-migrations
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praesidio.componentLabels" (dict "ctx" . "component" "migrations") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  {{- $root := . }}
  {{- range $path, $_ := .Files.Glob "files/migrations/*.sql" }}
  {{ base $path }}: |-
    {{- $root.Files.Get $path | nindent 4 }}
  {{- end }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "praesidio.fullname" . }}-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praesidio.componentLabels" (dict "ctx" . "component" "migrations") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        {{- include "praesidio.componentSelectorLabels" (dict "ctx" . "component" "migrations") | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "praesidio.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: migrate
          image: "{{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            # psql parses the DSN; gateway uses asyncpg DSN with a +asyncpg
            # driver suffix that psql cannot handle, so we strip it.
            - name: RAW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "praesidio.gatewaySecretName" . }}
                  key: database-url
          command:
            - /bin/sh
            - -ec
            - |
              # Strip SQLAlchemy +asyncpg driver suffix for psql compatibility.
              CLEAN_URL=$(printf '%s' "$RAW_DATABASE_URL" | sed 's#postgresql+asyncpg://#postgresql://#')
              for f in /migrations/*.sql; do
                echo "Applying $f"
                psql "$CLEAN_URL" -v ON_ERROR_STOP=1 -f "$f"
              done
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: migrations
          configMap:
            name: {{ include "praesidio.fullname" . }}-migrations
        - name: tmp
          emptyDir: {}
{{- end }}
