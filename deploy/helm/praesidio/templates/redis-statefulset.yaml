{{- if .Values.redis.embedded }}
# !!! DEV / DEMO ONLY. !!!
# In production, disable this and point REDIS_URL at a managed Redis
# (ElastiCache, Memorystore, Azure Cache for Redis).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "praesidio.componentName" (dict "ctx" . "component" "redis") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "praesidio.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "praesidio.componentName" (dict "ctx" . "component" "redis") }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "praesidio.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "praesidio.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 8 }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          imagePullPolicy: IfNotPresent
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.redis.storage.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.redis.storage.size }}
{{- end }}
