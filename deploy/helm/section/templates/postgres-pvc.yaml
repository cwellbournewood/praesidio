{{- if false }}
# Note: the embedded Postgres StatefulSet uses volumeClaimTemplates, which
# create PVCs per replica. This file is intentionally a no-op placeholder so
# operators have a place to drop a standalone PVC if they need to (e.g., to
# pre-provision storage). To enable, change the `if false` above and adjust.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "section.componentName" (dict "ctx" . "component" "postgres") }}-extra
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "section.componentLabels" (dict "ctx" . "component" "postgres") | nindent 4 }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.postgres.storage.size }}
{{- end }}
