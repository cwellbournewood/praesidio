{{- if not .Values.secrets.externalSecrets }}
# !!! DEVELOPMENT / DEMO ONLY !!!
# This Secret is created in-cluster from values.yaml. NEVER commit real
# production keys to values files in Git. In production, set
# `secrets.externalSecrets: true` and let external-secrets-operator sync
# from your KMS / Vault / Secrets Manager.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "section.gatewaySecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "section.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  database-url: {{ include "section.databaseUrl" . | quote }}
  redis-url: {{ include "section.redisUrl" . | quote }}
  api-keys: {{ .Values.secrets.values.apiKeys | quote }}
  vault-key: {{ .Values.secrets.values.vaultKey | default "REPLACE_WITH_BASE64_32_BYTES" | quote }}
  fpe-key: {{ .Values.secrets.values.fpeKey | default "REPLACE_WITH_HEX_KEY" | quote }}
  fpe-tweak: {{ .Values.secrets.values.fpeTweak | default "REPLACE_WITH_HEX_TWEAK" | quote }}
  openai-api-key: {{ .Values.secrets.values.openaiApiKey | quote }}
  anthropic-api-key: {{ .Values.secrets.values.anthropicApiKey | quote }}
  azure-openai-api-key: {{ .Values.secrets.values.azureOpenaiApiKey | quote }}
{{- end }}
