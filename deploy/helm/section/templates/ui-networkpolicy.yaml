{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "section.componentName" (dict "ctx" . "component" "ui") }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "section.componentLabels" (dict "ctx" . "component" "ui") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "section.componentSelectorLabels" (dict "ctx" . "component" "ui") | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Ingress controllers across any namespace.
    - from:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app.kubernetes.io/component: controller
      ports:
        - port: {{ .Values.service.ui.port }}
          protocol: TCP
  egress:
    {{- if .Values.networkPolicy.allowDnsEgress }}
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    {{- end }}
    # UI may only call the gateway admin API in-cluster.
    - to:
        - podSelector:
            matchLabels:
              {{- include "section.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 14 }}
      ports:
        - port: {{ .Values.gateway.port }}
          protocol: TCP
{{- end }}
