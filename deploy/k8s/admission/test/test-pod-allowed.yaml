# Positive fixture — this Pod MUST be admitted. Identical to the blocked
# pod except OPENAI_BASE_URL points at the in-cluster Praesidio gateway
# instead of directly at api.openai.com.
apiVersion: v1
kind: Pod
metadata:
  name: praesidio-admission-allowed
  labels:
    app.kubernetes.io/managed-by: praesidio-admission-test
spec:
  restartPolicy: Never
  volumes:
    - name: aws-credentials
      secret:
        secretName: aws-credentials
        optional: true
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 1"]
      env:
        - name: OPENAI_BASE_URL
          value: http://praesidio-gateway.praesidio.svc.cluster.local:8080/v1
        - name: AWS_REGION
          value: us-east-1
      volumeMounts:
        - name: aws-credentials
          mountPath: /var/run/aws
          readOnly: true
