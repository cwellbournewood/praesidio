# Negative fixture — this Pod must be REJECTED by the admission policy.
# Mounts AWS creds AND sets OPENAI_BASE_URL to api.openai.com directly.
apiVersion: v1
kind: Pod
metadata:
  name: praesidio-admission-blocked
  labels:
    app.kubernetes.io/managed-by: praesidio-admission-test
spec:
  restartPolicy: Never
  volumes:
    - name: aws-credentials
      secret:
        secretName: aws-credentials
        optional: true
  containers:
    - name: app
      image: busybox:1.36
      command: ["sh", "-c", "sleep 1"]
      env:
        - name: OPENAI_BASE_URL
          value: https://api.openai.com/v1
        - name: AWS_REGION
          value: us-east-1
      volumeMounts:
        - name: aws-credentials
          mountPath: /var/run/aws
          readOnly: true
