#
# Section · Instrument login theme
# Editorial bone+ink+vermillion aesthetic. Sharp corners, hairline borders,
# Instrument Serif headline + Geist Sans chrome + JetBrains Mono labels.
#

parent=keycloak
import=common/keycloak

# We override template.ftl and login.ftl entirely. The single stylesheet
# below contains the full visual reset so we never inherit PatternFly.
styles=css/login.css
stylesCommon=

# Block all imports from parent CSS — we want a clean slate.
locales=en,es
