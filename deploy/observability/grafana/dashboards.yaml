# Mounts the canonical Praesidio dashboards from deploy/grafana/dashboards/
# (no duplication — single source of truth for both Helm and compose).
apiVersion: 1

providers:
  - name: Praesidio
    orgId: 1
    folder: Praesidio
    folderUid: praesidio
    type: file
    disableDeletion: false
    editable: false
    updateIntervalSeconds: 30
    allowUiUpdates: false
    options:
      path: /var/lib/grafana/dashboards/praesidio
      foldersFromFilesStructure: false
