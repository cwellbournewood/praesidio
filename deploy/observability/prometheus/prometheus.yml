global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: praesidio-local
    environment: local

scrape_configs:
  - job_name: praesidio-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          service: gateway

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
