# OIDC overlay: adds a Keycloak container with a pre-seeded "section"
# realm for local dev. Stack the overlay on top of the root compose:
#
#   docker compose -f docker-compose.yml -f docker-compose.oidc.yml up
#
# See docs/operations/oidc.md for the full integration guide.

services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    command: ["start-dev", "--import-realm"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_LOG_LEVEL: INFO
    volumes:
      - ./deploy/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      # Mount only our theme subdir so Keycloak's built-in themes
      # (keycloak / base / admin) stay visible underneath.
      - ./deploy/keycloak/themes/section:/opt/keycloak/themes/section:ro
      - keycloakdata:/opt/keycloak/data
    ports:
      - "8081:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 20

  gateway:
    environment:
      OIDC_ISSUER: http://keycloak:8080/realms/section
      OIDC_CLIENT_ID: section
      OIDC_CLIENT_SECRET: section-demo-secret
      OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
      SECTION_OIDC_TENANT_CLAIM: tenant_id
      SECTION_RBAC_GROUP_MAP: |
        {"section-admins":["admin"],"section-ops":["operator","viewer"],"section-auditors":["auditor","viewer"],"section-viewers":["viewer"]}
    depends_on:
      keycloak:
        condition: service_healthy

  ui:
    environment:
      OIDC_ISSUER: http://keycloak:8080/realms/section
      OIDC_CLIENT_ID: section
      OIDC_CLIENT_SECRET: section-demo-secret
      OIDC_REDIRECT_URI: http://localhost:3000/api/auth/callback
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: section-dev-nextauth-secret
    depends_on:
      keycloak:
        condition: service_healthy

volumes:
  keycloakdata:
