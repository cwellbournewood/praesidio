<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Praesidio">
  <title>Praesidio</title>
  <desc>The Praesidio mark on a bone tile — favicon / app-icon. Sharp corners; the platform may mask to its own radius.</desc>
  <rect width="64" height="64" fill="#EFEAE0"/>
  <text x="32" y="48" text-anchor="middle"
        font-family="'Instrument Serif','Iowan Old Style','Cambria','Times New Roman',Georgia,serif"
        font-style="italic" font-weight="400" font-size="56" fill="#D14B2C">§</text>
</svg>
