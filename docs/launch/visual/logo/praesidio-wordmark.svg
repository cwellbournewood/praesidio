<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Praesidio">
  <title>Praesidio</title>
  <desc>Praesidio horizontal lockup. Section mark § italic vermillion + "praesidio" roman ink in Instrument Serif. Light variant — for use on bone surfaces.</desc>
  <text x="36" y="70" text-anchor="middle"
        font-family="'Instrument Serif','Iowan Old Style','Cambria','Times New Roman',Georgia,serif"
        font-style="italic" font-weight="400" font-size="80" fill="#D14B2C">§</text>
  <text x="88" y="66"
        font-family="'Instrument Serif','Iowan Old Style','Cambria','Times New Roman',Georgia,serif"
        font-style="normal" font-weight="400" font-size="56" fill="#0F0F0E" letter-spacing="-0.56">praesidio</text>
</svg>
