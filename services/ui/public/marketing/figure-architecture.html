<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Praesidio — Architecture</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #EFEAE0;
    --surface: #F4F0E6;
    --sunken:  #E1DACB;
    --rule:    #C9C3B5;
    --rule-strong: #A8A292;
    --ink:     #0F0F0E;
    --graphite:#3A352E;
    --dust:    #7A7367;
    --vermillion: #D14B2C;
    --moss:    #3B5F3B;
    --slate:   #4B645F;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--canvas); color: var(--ink); }
  body {
    width: 1600px; height: 1000px;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .frame {
    width: 100%; height: 100%;
    padding: 44px 56px 38px;
    display: grid; grid-template-rows: auto 1fr auto;
    background: var(--canvas);
  }
  /* TOP BAR */
  .top {
    display: flex; align-items: baseline; justify-content: space-between;
    padding-bottom: 18px; border-bottom: 1px solid var(--rule);
  }
  .top .l { display: flex; align-items: baseline; gap: 14px; }
  .top .l .sect {
    font-family: 'Instrument Serif', serif; font-style: italic;
    color: var(--vermillion); font-size: 28px;
  }
  .top .l .brand {
    font-family: 'Instrument Serif', serif; font-size: 36px;
    color: var(--ink); letter-spacing: -0.01em;
  }
  .top .l .brand em { font-style: italic; }
  .top .l .title {
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--dust);
    padding-left: 16px; border-left: 1px solid var(--rule); margin-left: 4px;
  }
  .top .r {
    display: flex; align-items: baseline; gap: 22px;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--dust);
  }
  .top .r .v { color: var(--ink); }
  /* STAGE */
  .stage {
    position: relative; padding: 18px 0 8px;
  }
  svg.flow { width: 100%; height: 100%; display: block; overflow: visible; }
  /* LEGEND */
  .legend {
    margin-top: 8px; padding-top: 14px;
    border-top: 1px solid var(--rule);
    display: flex; gap: 28px; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--dust);
  }
  .legend .item { display: inline-flex; align-items: center; gap: 8px; }
  .legend .sw { width: 12px; height: 12px; display: inline-block; }
  .legend .sw.ink { background: var(--ink); }
  .legend .sw.ver { background: var(--vermillion); }
  .legend .sw.tok { background: var(--sunken); border: 1px solid var(--rule); }
  .legend .sw.hi  { background: #F5E0D5; border-bottom: 2px solid var(--vermillion); }
  .legend .sw.ok  { background: var(--moss); }
  .legend .repo { margin-left: auto; color: var(--ink); }
</style>
</head>
<body>
<div class="frame">

  <!-- TOP BAR -->
  <div class="top">
    <div class="l">
      <span class="sect">§</span>
      <span class="brand"><em>Praesidio</em></span>
      <span class="title">FIG. 1 — REQUEST FLOW THROUGH THE GATEWAY</span>
    </div>
    <div class="r">
      <span>OPEN SOURCE · APACHE 2.0</span>
      <span class="v">v1.0 · 2026</span>
    </div>
  </div>

  <!-- STAGE -->
  <div class="stage">
    <svg class="flow" viewBox="0 0 1488 780" preserveAspectRatio="xMidYMid meet"
         xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="9" markerHeight="9" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#D14B2C" />
        </marker>
        <marker id="arrowReturn" viewBox="0 0 10 10" refX="9" refY="5"
                markerWidth="9" markerHeight="9" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#0F0F0E" />
        </marker>
        <pattern id="dot" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.55" fill="#C9C3B5" />
        </pattern>
      </defs>

      <!-- ====== ROW A: CLIENT  →  GATEWAY  →  MODELS ====== -->
      <!-- All three boxes vertically aligned at y=40, height=300. -->

      <!-- LEFT — Client -->
      <g transform="translate(0, 40)">
        <rect x="0" y="0" width="248" height="300" fill="#EFEAE0"
              stroke="#0F0F0E" stroke-width="1.6" />
        <text x="18" y="28" font-family="JetBrains Mono" font-size="11"
              letter-spacing="2.2" fill="#7A7367">§ i · CLIENT</text>
        <text x="18" y="68" font-family="Instrument Serif" font-size="32"
              fill="#0F0F0E">App · SDK</text>
        <line x1="18" y1="84" x2="230" y2="84" stroke="#C9C3B5" />

        <text x="18" y="112" font-family="JetBrains Mono" font-size="12"
              fill="#3A352E">POST /v1/chat/completions</text>

        <!-- Prompt body with PII highlighted (single layer, no overlap). -->
        <text x="18" y="146" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">"Email the contract</text>
        <text x="18" y="166" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">to</text>
        <!-- highlight chip for the email -->
        <rect x="48" y="153" width="174" height="18" fill="#F5E0D5" />
        <line x1="48" y1="171" x2="222" y2="171" stroke="#D14B2C" stroke-width="1.6" />
        <text x="52" y="167" font-family="JetBrains Mono" font-size="12.5"
              fill="#0F0F0E">alice.kim@acme.io</text>
        <text x="18" y="194" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">+ call</text>
        <rect x="68" y="181" width="138" height="18" fill="#F5E0D5" />
        <line x1="68" y1="199" x2="206" y2="181" stroke="#D14B2C" stroke-width="0" />
        <line x1="68" y1="199" x2="206" y2="199" stroke="#D14B2C" stroke-width="1.6" />
        <text x="72" y="195" font-family="JetBrains Mono" font-size="12.5"
              fill="#0F0F0E">+1 415 555 0142</text>
        <text x="18" y="218" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">today."</text>

        <text x="18" y="262" font-family="JetBrains Mono" font-size="11"
              letter-spacing="2" fill="#D14B2C">▸ AUTH · OIDC · API KEY</text>
        <text x="18" y="282" font-family="JetBrains Mono" font-size="11"
              letter-spacing="2" fill="#7A7367">▸ 2 ENTITIES DETECTED</text>
      </g>

      <!-- ARROW: Client → Gateway -->
      <g>
        <line x1="252" y1="190" x2="356" y2="190" stroke="#D14B2C"
              stroke-width="2" marker-end="url(#arrow)" />
        <text x="258" y="180" font-family="JetBrains Mono" font-size="10.5"
              letter-spacing="1.6" fill="#7A7367">RAW PROMPT</text>
      </g>

      <!-- CENTER — Praesidio Gateway -->
      <g transform="translate(360, 40)">
        <rect x="0" y="0" width="780" height="300" fill="#EFEAE0"
              stroke="#0F0F0E" stroke-width="2" />
        <rect x="0" y="0" width="780" height="300" fill="url(#dot)" />
        <!-- Header band -->
        <rect x="0" y="0" width="780" height="44" fill="#0F0F0E" />
        <text x="18" y="29" font-family="Instrument Serif" font-style="italic"
              fill="#D14B2C" font-size="22">§</text>
        <text x="40" y="29" font-family="Instrument Serif" font-size="24"
              fill="#EFEAE0">Praesidio Gateway</text>
        <text x="598" y="29" font-family="JetBrains Mono" font-size="10.5"
              letter-spacing="2.2" fill="#C9C3B5">FASTAPI · PYTHON 3.11</text>

        <!-- 4-stage pipeline -->
        <g font-family="JetBrains Mono">
          <!-- 1. Detect -->
          <rect x="22" y="68" width="178" height="212" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="34" y="92" font-size="10" letter-spacing="2.2" fill="#7A7367">§ 1 · DETECT</text>
          <text x="34" y="124" font-family="Instrument Serif" font-size="26"
                fill="#0F0F0E">Findings</text>
          <line x1="34" y1="138" x2="188" y2="138" stroke="#C9C3B5" />
          <text x="34" y="164" font-size="11.5" fill="#3A352E">presidio · regex</text>
          <text x="34" y="184" font-size="11.5" fill="#3A352E">spaCy · classifier</text>
          <text x="34" y="204" font-size="11.5" fill="#3A352E">secrets · code</text>
          <text x="34" y="224" font-size="11.5" fill="#3A352E">prompt-injection</text>
          <text x="34" y="252" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ EMAIL · PHONE</text>
          <text x="34" y="270" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ 2 ENTITIES</text>

          <!-- 2. Decide (CEL) -->
          <rect x="212" y="68" width="178" height="212" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="224" y="92" font-size="10" letter-spacing="2.2" fill="#7A7367">§ 2 · DECIDE</text>
          <text x="224" y="124" font-family="Instrument Serif" font-size="26"
                fill="#0F0F0E">CEL policy</text>
          <line x1="224" y1="138" x2="378" y2="138" stroke="#C9C3B5" />
          <text x="224" y="164" font-size="11.5" fill="#3A352E">match → action</text>
          <text x="224" y="184" font-size="11.5" fill="#3A352E">allow / block</text>
          <text x="224" y="204" font-size="11.5" fill="#3A352E">transform / route</text>
          <text x="224" y="224" font-size="11.5" fill="#3A352E">cosign-verified</text>
          <text x="224" y="252" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ TRANSFORM</text>
          <text x="224" y="270" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ RULE 06 · 07</text>

          <!-- 3. Transform (Tokenise) -->
          <rect x="402" y="68" width="178" height="212" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="414" y="92" font-size="10" letter-spacing="2.2" fill="#7A7367">§ 3 · TRANSFORM</text>
          <text x="414" y="124" font-family="Instrument Serif" font-size="26"
                fill="#0F0F0E">Tokenise</text>
          <line x1="414" y1="138" x2="568" y2="138" stroke="#C9C3B5" />
          <text x="414" y="164" font-size="11.5" fill="#3A352E">vault (Redis)</text>
          <text x="414" y="184" font-size="11.5" fill="#3A352E">AES-256-GCM</text>
          <text x="414" y="204" font-size="11.5" fill="#3A352E">FPE · FF3-1</text>
          <text x="414" y="224" font-size="11.5" fill="#3A352E">redact (no return)</text>
          <text x="414" y="252" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ &lt;EMAIL_A2B3&gt;</text>
          <text x="414" y="270" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ &lt;PHONE_8FX0&gt;</text>

          <!-- 4. Route -->
          <rect x="592" y="68" width="166" height="212" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="604" y="92" font-size="10" letter-spacing="2.2" fill="#7A7367">§ 4 · ROUTE</text>
          <text x="604" y="124" font-family="Instrument Serif" font-size="26"
                fill="#0F0F0E">Backend</text>
          <line x1="604" y1="138" x2="746" y2="138" stroke="#C9C3B5" />
          <text x="604" y="164" font-size="11.5" fill="#3A352E">jurisdiction</text>
          <text x="604" y="184" font-size="11.5" fill="#3A352E">SOC2 · HIPAA</text>
          <text x="604" y="204" font-size="11.5" fill="#3A352E">TPM rate-limit</text>
          <text x="604" y="224" font-size="11.5" fill="#3A352E">token meter</text>
          <text x="604" y="252" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ AZURE/EU</text>
          <text x="604" y="270" font-size="10.5" letter-spacing="1.6" fill="#D14B2C">▸ 12 MS · BAA</text>

          <!-- inner arrows between stages -->
          <g stroke="#D14B2C" stroke-width="1.4" fill="none">
            <line x1="200" y1="180" x2="212" y2="180" marker-end="url(#arrow)" />
            <line x1="390" y1="180" x2="402" y2="180" marker-end="url(#arrow)" />
            <line x1="580" y1="180" x2="592" y2="180" marker-end="url(#arrow)" />
          </g>
        </g>
      </g>

      <!-- ARROW: Gateway → Models -->
      <g>
        <line x1="1144" y1="190" x2="1248" y2="190" stroke="#D14B2C"
              stroke-width="2" marker-end="url(#arrow)" />
        <text x="1156" y="180" font-family="JetBrains Mono" font-size="10.5"
              letter-spacing="1.6" fill="#7A7367">TOKENISED</text>
      </g>

      <!-- RIGHT — Models -->
      <g transform="translate(1252, 40)">
        <rect x="0" y="0" width="236" height="300" fill="#EFEAE0"
              stroke="#0F0F0E" stroke-width="1.6" />
        <text x="18" y="28" font-family="JetBrains Mono" font-size="11"
              letter-spacing="2.2" fill="#7A7367">§ vi · UPSTREAM</text>
        <text x="18" y="68" font-family="Instrument Serif" font-size="32"
              fill="#0F0F0E">Models</text>
        <line x1="18" y1="84" x2="218" y2="84" stroke="#C9C3B5" />

        <text x="18" y="114" font-family="JetBrains Mono" font-size="12" fill="#3A352E">openai/gpt-4o</text>
        <text x="18" y="136" font-family="JetBrains Mono" font-size="12" fill="#3A352E">anthropic/claude-3</text>
        <text x="18" y="158" font-family="JetBrains Mono" font-size="12" fill="#0F0F0E">azure/gpt-4o-eu</text>
        <text x="178" y="158" font-family="JetBrains Mono" font-size="13" fill="#D14B2C">◂</text>
        <text x="18" y="180" font-family="JetBrains Mono" font-size="12" fill="#3A352E">bedrock/claude-3</text>
        <text x="18" y="202" font-family="JetBrains Mono" font-size="12" fill="#3A352E">ollama/llama-3.1</text>

        <line x1="18" y1="226" x2="218" y2="226" stroke="#C9C3B5" stroke-dasharray="3 3" />
        <text x="18" y="252" font-family="JetBrains Mono" font-size="11"
              letter-spacing="1.6" fill="#D14B2C">▸ NEVER SEES THE SECRET</text>
        <text x="18" y="272" font-family="JetBrains Mono" font-size="11"
              letter-spacing="1.6" fill="#7A7367">▸ 9 BACKENDS · BAA-AWARE</text>
      </g>

      <!-- ====== RETURN PATH ====== -->
      <!-- Smooth curve from Models back to the restore-stream box, with a
           single labelled "RESPONSE · STREAMED" caption. -->
      <path d="M 1370,340 C 1370,400 1100,408 760,408" stroke="#0F0F0E"
            stroke-width="1.5" fill="none" stroke-dasharray="6 4" />
      <text x="930" y="398" font-family="JetBrains Mono" font-size="11"
            letter-spacing="2" fill="#3A352E">RESPONSE · STREAMED</text>

      <!-- Restore-stream box (centred under the Gateway) -->
      <g transform="translate(360, 408)">
        <rect x="0" y="0" width="780" height="126" fill="#EFEAE0"
              stroke="#0F0F0E" stroke-width="1.5" />
        <text x="20" y="26" font-family="JetBrains Mono" font-size="10.5"
              letter-spacing="2.2" fill="#7A7367">§ 5 · DETOKENISE · RESTORE STREAM</text>
        <text x="20" y="62" font-family="Instrument Serif" font-size="26"
              fill="#0F0F0E">Restore stream</text>
        <line x1="20" y1="76" x2="760" y2="76" stroke="#C9C3B5" />
        <text x="20" y="102" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">"...I've drafted the email to</text>
        <rect x="245" y="89" width="174" height="18" fill="none" stroke="#3B5F3B" stroke-width="1.4" />
        <text x="249" y="103" font-family="JetBrains Mono" font-size="12.5"
              fill="#0F0F0E">alice.kim@acme.io</text>
        <text x="426" y="102" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">and confirmed</text>
        <rect x="540" y="89" width="138" height="18" fill="none" stroke="#3B5F3B" stroke-width="1.4" />
        <text x="544" y="103" font-family="JetBrains Mono" font-size="12.5"
              fill="#0F0F0E">+1 415 555 0142</text>
        <text x="680" y="102" font-family="JetBrains Mono" font-size="13"
              fill="#3A352E">..."</text>
      </g>

      <!-- Return arrow Restore → Client -->
      <line x1="360" y1="470" x2="252" y2="470" stroke="#0F0F0E"
            stroke-width="1.5" marker-end="url(#arrowReturn)" />
      <text x="262" y="460" font-family="JetBrains Mono" font-size="10.5"
            letter-spacing="2" fill="#7A7367">CLIENT</text>

      <!-- ====== AUDIT & LINEAGE RAIL ====== -->
      <g transform="translate(0, 568)">
        <rect x="0" y="0" width="1488" height="212" fill="#EFEAE0"
              stroke="#0F0F0E" stroke-width="1.5" />
        <text x="22" y="28" font-family="JetBrains Mono" font-size="11"
              letter-spacing="2.2" fill="#7A7367">§ vii · AUDIT &amp; LINEAGE — EVERY DECISION, HASH-CHAINED</text>
        <text x="22" y="64" font-family="Instrument Serif" font-size="24"
              fill="#0F0F0E">Postgres · SQLite · WORM-compatible</text>

        <!-- Hash chain — 4 nodes, generously sized -->
        <g transform="translate(22, 88)">
          <!-- node 1: BLOCK -->
          <rect x="0" y="0" width="240" height="104" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="14" y="24" font-family="JetBrains Mono" font-size="10.5"
                letter-spacing="2" fill="#7A7367">§ 7,142 · 22:41:38Z</text>
          <text x="14" y="52" font-family="JetBrains Mono" font-size="13"
                fill="#0F0F0E" letter-spacing="0.6">e8a4c9b3 71d62f0a</text>
          <text x="14" y="72" font-family="JetBrains Mono" font-size="13"
                fill="#3A352E" letter-spacing="0.6">1c4b8e95 a92f7e02</text>
          <text x="14" y="94" font-family="JetBrains Mono" font-size="11"
                letter-spacing="1.6" fill="#D14B2C">■ BLOCK · secrets.aws</text>

          <!-- node 2: TRANSFORM email -->
          <rect x="256" y="0" width="240" height="104" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="270" y="24" font-family="JetBrains Mono" font-size="10.5"
                letter-spacing="2" fill="#7A7367">§ 7,143 · 22:41:39Z</text>
          <text x="270" y="52" font-family="JetBrains Mono" font-size="13"
                fill="#0F0F0E" letter-spacing="0.6">4f291ba7 e3c5d8f2</text>
          <text x="270" y="72" font-family="JetBrains Mono" font-size="13"
                fill="#3A352E" letter-spacing="0.6">9b7164a1 4a3e019c</text>
          <text x="270" y="94" font-family="JetBrains Mono" font-size="11"
                letter-spacing="1.6" fill="#0F0F0E">■ TRANSFORM · pii.email</text>

          <!-- node 3: ALLOW -->
          <rect x="512" y="0" width="240" height="104" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="526" y="24" font-family="JetBrains Mono" font-size="10.5"
                letter-spacing="2" fill="#7A7367">§ 7,144 · 22:41:39Z</text>
          <text x="526" y="52" font-family="JetBrains Mono" font-size="13"
                fill="#0F0F0E" letter-spacing="0.6">aa83c14d 2e6f95b8</text>
          <text x="526" y="72" font-family="JetBrains Mono" font-size="13"
                fill="#3A352E" letter-spacing="0.6">518429cf b0e7a214</text>
          <text x="526" y="94" font-family="JetBrains Mono" font-size="11"
                letter-spacing="1.6" fill="#3B5F3B">■ ALLOW · default</text>

          <!-- node 4: TRANSFORM phone -->
          <rect x="768" y="0" width="240" height="104" fill="#EFEAE0" stroke="#C9C3B5" />
          <text x="782" y="24" font-family="JetBrains Mono" font-size="10.5"
                letter-spacing="2" fill="#7A7367">§ 7,145 · 22:41:40Z</text>
          <text x="782" y="52" font-family="JetBrains Mono" font-size="13"
                fill="#0F0F0E" letter-spacing="0.6">5d7e1f04 c8a26b91</text>
          <text x="782" y="72" font-family="JetBrains Mono" font-size="13"
                fill="#3A352E" letter-spacing="0.6">3f4082ce 79ae51d0</text>
          <text x="782" y="94" font-family="JetBrains Mono" font-size="11"
                letter-spacing="1.6" fill="#0F0F0E">■ TRANSFORM · pii.phone</text>

          <!-- chain arrows -->
          <g stroke="#D14B2C" stroke-width="1.4" fill="none">
            <line x1="240" y1="52" x2="256" y2="52" marker-end="url(#arrow)" />
            <line x1="496" y1="52" x2="512" y2="52" marker-end="url(#arrow)" />
            <line x1="752" y1="52" x2="768" y2="52" marker-end="url(#arrow)" />
            <line x1="1008" y1="52" x2="1028" y2="52" marker-end="url(#arrow)" />
          </g>
          <text x="1036" y="58" font-family="Instrument Serif"
                font-style="italic" font-size="22" fill="#D14B2C">→ chain</text>
        </g>
